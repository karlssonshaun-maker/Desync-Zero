# ─────────────────────────────────────────────────────────────────────────────
# Desync-Zero — Production Compose
#
# Service map:
#   postgres    → persistent data store
#   pgbouncer   → connection pooler in front of postgres (transaction mode)
#   redis       → cache + retry queue + rate-limiter state
#   api         → FastAPI (stateless, scales horizontally)
#   worker      → Retry queue processor (single instance, distributed lock)
#   ui          → Next.js dashboard
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: desync-zero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: desync_zero
      POSTGRES_USER: desync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./migrations/002_multitenancy.sql:/docker-entrypoint-initdb.d/002_multitenancy.sql:ro
    # Postgres is NOT exposed externally — only PgBouncer is
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desync -d desync_zero"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── PgBouncer ──────────────────────────────────────────────────────────────
  # Transaction-pooling mode: each SQL transaction gets a real Postgres
  # connection; between transactions the connection returns to the pool.
  # This allows hundreds of app connections to share a small Postgres pool,
  # which is critical during traffic spikes (Black Friday, etc.).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: desync-zero-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: desync
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: desync_zero
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256
    ports:
      - "5433:5432"   # expose PgBouncer on 5433 for local inspection / migrations
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U desync"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: desync-zero-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ────────────────────────────────────────────────────────────────────
  # Stateless — safe to scale (docker compose up --scale api=3).
  # Connects to Postgres through PgBouncer.
  # Does NOT run the retry worker — that lives in its own container.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desync-zero-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://desync:${POSTGRES_PASSWORD}@pgbouncer:5432/desync_zero
      REDIS_URL: redis://redis:6379/0
      USE_PGBOUNCER: "true"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Worker ─────────────────────────────────────────────────────────────────
  # Dedicated retry-queue processor.
  # Uses a Redis distributed lock so only ONE instance processes the queue
  # at a time — safe to keep running during rolling deploys.
  # Never scale this beyond 1 replica; horizontal scaling is handled via
  # the distributed lock competing for work.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desync-zero-worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://desync:${POSTGRES_PASSWORD}@pgbouncer:5432/desync_zero
      REDIS_URL: redis://redis:6379/0
      USE_PGBOUNCER: "true"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── UI ─────────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: desync-zero-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
